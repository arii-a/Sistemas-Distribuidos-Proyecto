syntax = "proto3";

package tickmaster;

option java_package = "edu.upb.tickmaster.grpc";
option java_outer_classname = "Compra";
option java_multiple_files = true;

service CompraService {

  rpc comprarTicket (CompraRequest) returns (CompraResponse);

}

message CompraRequest {
  string usuario = 1;
  int32 cantidad = 3;
}

message CompraResponse {
  bool exitoso = 1;
  string mensaje = 2;
}